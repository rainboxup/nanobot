name: Deploy to 1Panel

on:
  push:
    branches:
      - saas-main
  workflow_dispatch:

concurrency:
  group: deploy-saas-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SMOKE_OIDC_ID_TOKEN: ${{ secrets.SMOKE_OIDC_ID_TOKEN }}
      SMOKE_URL: ${{ secrets.SMOKE_URL }}
      SMOKE_INTERNAL_URL: ${{ secrets.SMOKE_INTERNAL_URL }}
      SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
      SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
      SMOKE_EXPECT_USERNAME: ${{ secrets.SMOKE_EXPECT_USERNAME }}
      SMOKE_EXPECT_TENANT_ID: ${{ secrets.SMOKE_EXPECT_TENANT_ID }}
      SMOKE_EXPECT_ROLE: ${{ secrets.SMOKE_EXPECT_ROLE }}

    steps:
      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            DEPLOY_BRANCH='${{ secrets.DEPLOY_BRANCH }}'
            DEPLOY_COMMAND='${{ secrets.DEPLOY_COMMAND }}'
            DEPLOY_COMPOSE_FILE='${{ secrets.DEPLOY_COMPOSE_FILE }}'

            if [ -z "$DEPLOY_BRANCH" ]; then
              DEPLOY_BRANCH='saas-main'
            fi

            compose_up_with_retry() {
              local file="$1"
              local attempts=3
              local i=1
              while [ "$i" -le "$attempts" ]; do
                if docker compose -f "$file" up -d --build; then
                  return 0
                fi
                echo "[deploy] compose up failed (attempt $i/$attempts)"
                if [ "$i" -lt "$attempts" ]; then
                  docker builder prune -f || true
                  sleep 5
                fi
                i=$((i + 1))
              done
              return 1
            }

            cd "$DEPLOY_PATH"
            echo "[deploy] pwd=$(pwd)"
            git fetch origin --prune
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"

            if [ -n "$DEPLOY_COMMAND" ]; then
              echo "[deploy] running DEPLOY_COMMAND"
              if eval "$DEPLOY_COMMAND"; then
                exit 0
              fi
              echo "[deploy] DEPLOY_COMMAND failed, falling back to compose auto-detection"
            fi

            if [ -n "$DEPLOY_COMPOSE_FILE" ]; then
              echo "[deploy] using DEPLOY_COMPOSE_FILE=$DEPLOY_COMPOSE_FILE"
              compose_up_with_retry "$DEPLOY_COMPOSE_FILE"
              exit 0
            fi

            compose_file=""
            # Prefer production compose.yml (SaaS) over local-dev docker-compose.yml.
            for candidate in compose.yml compose.yaml docker-compose.yml docker-compose.yaml; do
              if [ -f "$candidate" ]; then
                compose_file="$candidate"
                break
              fi
            done

            if [ -n "$compose_file" ]; then
              echo "[deploy] using compose file: $compose_file"
              compose_up_with_retry "$compose_file"
            else
              echo "No DEPLOY_COMMAND provided and no compose file found in $DEPLOY_PATH."
              ls -la
              exit 1
            fi

      - name: Post-deploy remote smoke (SSH localhost)
        uses: appleboy/ssh-action@v1.2.0
        env:
          REMOTE_SMOKE_URL: ${{ env.SMOKE_INTERNAL_URL }}
          REMOTE_SMOKE_USERNAME: ${{ env.SMOKE_USERNAME }}
          REMOTE_SMOKE_PASSWORD: ${{ env.SMOKE_PASSWORD }}
          REMOTE_SMOKE_OIDC_ID_TOKEN: ${{ env.SMOKE_OIDC_ID_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          envs: REMOTE_SMOKE_URL,REMOTE_SMOKE_USERNAME,REMOTE_SMOKE_PASSWORD,REMOTE_SMOKE_OIDC_ID_TOKEN
          script: |
            set -euo pipefail
            if [ -z "${REMOTE_SMOKE_URL:-}" ]; then
              REMOTE_SMOKE_URL="http://127.0.0.1:8318"
            fi
            export REMOTE_SMOKE_URL REMOTE_SMOKE_USERNAME REMOTE_SMOKE_PASSWORD REMOTE_SMOKE_OIDC_ID_TOKEN

            PYTHON_BIN="python3"
            if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
              if command -v python >/dev/null 2>&1; then
                PYTHON_BIN="python"
              else
                echo "::error::python/python3 not found on remote host"
                exit 1
              fi
            fi

            "$PYTHON_BIN" - <<'PY'
            import json
            import os
            import sys
            import urllib.error
            import urllib.request

            base_url = str(os.getenv("REMOTE_SMOKE_URL") or "http://127.0.0.1:8318").strip().rstrip("/")
            username = str(os.getenv("REMOTE_SMOKE_USERNAME") or "").strip()
            password = str(os.getenv("REMOTE_SMOKE_PASSWORD") or "")
            id_token = str(os.getenv("REMOTE_SMOKE_OIDC_ID_TOKEN") or "").strip()

            if not base_url:
                print("REMOTE_SMOKE_URL is empty", file=sys.stderr)
                raise SystemExit(2)

            def request(method: str, path: str, payload=None, headers=None):
                url = f"{base_url}{path}"
                data = None
                req_headers = {"Content-Type": "application/json"}
                if headers:
                    req_headers.update(headers)
                if payload is not None:
                    data = json.dumps(payload).encode("utf-8")
                req = urllib.request.Request(url=url, data=data, headers=req_headers, method=method)
                try:
                    with urllib.request.urlopen(req, timeout=20) as resp:
                        raw = resp.read().decode("utf-8", errors="replace")
                        status = int(resp.getcode() or 0)
                except urllib.error.HTTPError as exc:
                    raw = exc.read().decode("utf-8", errors="replace")
                    status = int(exc.code or 0)
                except urllib.error.URLError as exc:
                    print(f"request failed: {method} {path}: {exc}", file=sys.stderr)
                    raise SystemExit(2)
                try:
                    body = json.loads(raw) if raw else {}
                except Exception:
                    body = {"raw": raw}
                return status, body

            status, body = request("GET", "/api/health")
            print(f"[health] status={status}")
            print(json.dumps(body, ensure_ascii=False))
            if status != 200:
                raise SystemExit(2)

            status, body = request("GET", "/api/ready")
            print(f"[ready] status={status}")
            print(json.dumps(body, ensure_ascii=False))
            if status not in (200, 503):
                raise SystemExit(2)

            if username and password:
                status, body = request(
                    "POST",
                    "/api/auth/login",
                    payload={"username": username, "password": password},
                )
                print(f"[login:local] status={status}")
                print(json.dumps(body, ensure_ascii=False))
                if status != 200:
                    raise SystemExit(2)
                token = str(body.get("access_token") or body.get("token") or "").strip()
                if not token:
                    print("local login succeeded but access token missing", file=sys.stderr)
                    raise SystemExit(2)
                status, body = request(
                    "GET",
                    "/api/auth/me",
                    headers={"Authorization": f"Bearer {token}"},
                )
                print(f"[me] status={status}")
                print(json.dumps(body, ensure_ascii=False))
                if status != 200:
                    raise SystemExit(2)
                print("Remote smoke passed via local credentials")
                raise SystemExit(0)

            if id_token:
                status, body = request(
                    "POST",
                    "/api/auth/login",
                    payload={"id_token": id_token},
                )
                print(f"[login:oidc] status={status}")
                print(json.dumps(body, ensure_ascii=False))
                if status != 200:
                    raise SystemExit(2)
                token = str(body.get("access_token") or body.get("token") or "").strip()
                if not token:
                    print("oidc login succeeded but access token missing", file=sys.stderr)
                    raise SystemExit(2)
                status, body = request(
                    "GET",
                    "/api/auth/me",
                    headers={"Authorization": f"Bearer {token}"},
                )
                print(f"[me] status={status}")
                print(json.dumps(body, ensure_ascii=False))
                if status != 200:
                    raise SystemExit(2)
                print("Remote smoke passed via oidc id_token")
                raise SystemExit(0)

            status, body = request("POST", "/api/auth/login", payload={})
            print(f"[login:preflight-empty] status={status}")
            print(json.dumps(body, ensure_ascii=False))
            reason = str(body.get("reason_code") or "").strip()
            if reason in {"oidc_id_token_required", "username_required"}:
                print("Remote smoke passed via preflight reason_code")
                raise SystemExit(0)

            print("remote smoke preflight failed: unexpected reason_code", file=sys.stderr)
            raise SystemExit(2)
            PY

      - name: Checkout repository for smoke scripts
        uses: actions/checkout@v4

      - name: Setup Python for smoke checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install httpx

      - name: Post-deploy external smoke (best effort)
        env:
          NANOBOT_SMOKE_URL: ${{ env.SMOKE_URL }}
          NANOBOT_SMOKE_OIDC_ID_TOKEN: ${{ env.SMOKE_OIDC_ID_TOKEN }}
          NANOBOT_SMOKE_EXPECT_USERNAME: ${{ env.SMOKE_EXPECT_USERNAME }}
          NANOBOT_SMOKE_EXPECT_TENANT_ID: ${{ env.SMOKE_EXPECT_TENANT_ID }}
          NANOBOT_SMOKE_EXPECT_ROLE: ${{ env.SMOKE_EXPECT_ROLE }}
        run: |
          set -euo pipefail
          if [ -z "${NANOBOT_SMOKE_URL:-}" ]; then
            echo "::notice::SMOKE_URL not set; skipping external smoke"
            exit 0
          fi
          if [ -n "${NANOBOT_SMOKE_OIDC_ID_TOKEN:-}" ]; then
            if ! python scripts/smoke_oidc_login.py --allow-ready-degraded --timeout 20; then
              echo "::warning::External smoke failed (network/path issue likely); remote smoke already executed on target host"
            fi
          else
            echo "::notice::SMOKE_OIDC_ID_TOKEN not set; running OIDC preflight mode"
            if ! python scripts/smoke_oidc_login.py --allow-ready-degraded --timeout 20 --oidc-preflight; then
              echo "::warning::External smoke failed (network/path issue likely); remote smoke already executed on target host"
            fi
          fi
