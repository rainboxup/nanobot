name: Deploy to 1Panel

on:
  push:
    branches:
      - saas-main
  workflow_dispatch:

concurrency:
  group: deploy-saas-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SMOKE_OIDC_ID_TOKEN: ${{ secrets.SMOKE_OIDC_ID_TOKEN }}
      SMOKE_URL: ${{ secrets.SMOKE_URL }}
      SMOKE_EXPECT_USERNAME: ${{ secrets.SMOKE_EXPECT_USERNAME }}
      SMOKE_EXPECT_TENANT_ID: ${{ secrets.SMOKE_EXPECT_TENANT_ID }}
      SMOKE_EXPECT_ROLE: ${{ secrets.SMOKE_EXPECT_ROLE }}

    steps:
      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            DEPLOY_BRANCH='${{ secrets.DEPLOY_BRANCH }}'
            DEPLOY_COMMAND='${{ secrets.DEPLOY_COMMAND }}'
            DEPLOY_COMPOSE_FILE='${{ secrets.DEPLOY_COMPOSE_FILE }}'

            if [ -z "$DEPLOY_BRANCH" ]; then
              DEPLOY_BRANCH='saas-main'
            fi

            cd "$DEPLOY_PATH"
            echo "[deploy] pwd=$(pwd)"
            git fetch origin --prune
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"

            if [ -n "$DEPLOY_COMMAND" ]; then
              echo "[deploy] running DEPLOY_COMMAND"
              if eval "$DEPLOY_COMMAND"; then
                exit 0
              fi
              echo "[deploy] DEPLOY_COMMAND failed, falling back to compose auto-detection"
            fi

            if [ -n "$DEPLOY_COMPOSE_FILE" ]; then
              echo "[deploy] using DEPLOY_COMPOSE_FILE=$DEPLOY_COMPOSE_FILE"
              docker compose -f "$DEPLOY_COMPOSE_FILE" up -d --build
              exit 0
            fi

            compose_file=""
            # Prefer production compose.yml (SaaS) over local-dev docker-compose.yml.
            for candidate in compose.yml compose.yaml docker-compose.yml docker-compose.yaml; do
              if [ -f "$candidate" ]; then
                compose_file="$candidate"
                break
              fi
            done

            if [ -n "$compose_file" ]; then
              echo "[deploy] using compose file: $compose_file"
              docker compose -f "$compose_file" up -d --build
            else
              echo "No DEPLOY_COMMAND provided and no compose file found in $DEPLOY_PATH."
              ls -la
              exit 1
            fi

      - name: Checkout repository for smoke scripts
        uses: actions/checkout@v4

      - name: Setup Python for smoke checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install httpx

      - name: Post-deploy OIDC smoke
        env:
          NANOBOT_SMOKE_URL: ${{ env.SMOKE_URL }}
          NANOBOT_SMOKE_OIDC_ID_TOKEN: ${{ env.SMOKE_OIDC_ID_TOKEN }}
          NANOBOT_SMOKE_EXPECT_USERNAME: ${{ env.SMOKE_EXPECT_USERNAME }}
          NANOBOT_SMOKE_EXPECT_TENANT_ID: ${{ env.SMOKE_EXPECT_TENANT_ID }}
          NANOBOT_SMOKE_EXPECT_ROLE: ${{ env.SMOKE_EXPECT_ROLE }}
        run: |
          set -euo pipefail
          if [ -z "${NANOBOT_SMOKE_URL:-}" ]; then
            echo "::notice::SMOKE_URL not set; skipping post-deploy OIDC smoke"
            exit 0
          fi
          if [ -n "${NANOBOT_SMOKE_OIDC_ID_TOKEN:-}" ]; then
            python scripts/smoke_oidc_login.py --allow-ready-degraded --timeout 20
          else
            echo "::notice::SMOKE_OIDC_ID_TOKEN not set; running OIDC preflight mode"
            python scripts/smoke_oidc_login.py --allow-ready-degraded --timeout 20 --oidc-preflight
          fi
