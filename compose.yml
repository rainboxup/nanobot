name: nanobot

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: rainboxup/nanobot:saas-main
    container_name: nanobot-gateway
    command: ["gateway", "--multi-tenant", "--enable-web"]
    restart: unless-stopped
    init: true

    ports:
      - "${NANOBOT_PORT:-18790}:18790"

    environment:
      TZ: "${TZ:-UTC}"
      NANOBOT_PROFILE: "${NANOBOT_PROFILE:-small}"
      NANOBOT_GATEWAY__HOST: "0.0.0.0"
      NANOBOT_GATEWAY__PORT: "18790"
      # Required for web login + stable sessions (set in .env or your panel secrets UI).
      NANOBOT_ADMIN_PASSWORD: "${NANOBOT_ADMIN_PASSWORD:?set NANOBOT_ADMIN_PASSWORD}"
      NANOBOT_JWT_SECRET: "${NANOBOT_JWT_SECRET:?set NANOBOT_JWT_SECRET}"
      # Closed beta mode (recommended for SaaS). Allowlist is seeded from env at startup.
      NANOBOT_WEB_CLOSED_BETA: "${NANOBOT_WEB_CLOSED_BETA:-1}"
      NANOBOT_WEB_ALLOWED_USERS: "${NANOBOT_WEB_ALLOWED_USERS:-admin}"
      NANOBOT_WEB_AUDIT_ENABLED: "${NANOBOT_WEB_AUDIT_ENABLED:-1}"
      NANOBOT_WEB_REFRESH_COOKIE_NAME: "${NANOBOT_WEB_REFRESH_COOKIE_NAME:-nanobot_refresh_token}"
      NANOBOT_WEB_REFRESH_COOKIE_SECURE: "${NANOBOT_WEB_REFRESH_COOKIE_SECURE:-1}"
      NANOBOT_WEB_REFRESH_COOKIE_SAMESITE: "${NANOBOT_WEB_REFRESH_COOKIE_SAMESITE:-lax}"
      NANOBOT_WEB_REFRESH_COOKIE_PATH: "${NANOBOT_WEB_REFRESH_COOKIE_PATH:-/api/auth}"
      NANOBOT_WEB_REFRESH_TOKEN_SOURCE_POLICY: "${NANOBOT_WEB_REFRESH_TOKEN_SOURCE_POLICY:-hybrid_prefer_cookie}"
      NANOBOT_WEB_REFRESH_BODY_REQUIRE_SAME_ORIGIN: "${NANOBOT_WEB_REFRESH_BODY_REQUIRE_SAME_ORIGIN:-1}"
      NANOBOT_WEB_TRUSTED_PROXY_CIDRS: "${NANOBOT_WEB_TRUSTED_PROXY_CIDRS:-}"
      NANOBOT_WEB_REFRESH_ALLOWED_ORIGINS: "${NANOBOT_WEB_REFRESH_ALLOWED_ORIGINS:-}"
      NANOBOT_WEB_CORS_ORIGINS: "${NANOBOT_WEB_CORS_ORIGINS:-}"
      NANOBOT_WEB_WS_ALLOW_QUERY_TOKEN: "${NANOBOT_WEB_WS_ALLOW_QUERY_TOKEN:-0}"
      NANOBOT_WEB_UVICORN_WS_BACKEND: "${NANOBOT_WEB_UVICORN_WS_BACKEND:-wsproto}"
      NANOBOT_TRAFFIC__INBOUND_QUEUE_SIZE: "${NANOBOT_TRAFFIC__INBOUND_QUEUE_SIZE:-50}"
      NANOBOT_TRAFFIC__OUTBOUND_QUEUE_SIZE: "${NANOBOT_TRAFFIC__OUTBOUND_QUEUE_SIZE:-50}"
      NANOBOT_TRAFFIC__TENANT_BURST_LIMIT: "${NANOBOT_TRAFFIC__TENANT_BURST_LIMIT:-5}"
      NANOBOT_TRAFFIC__WORKER_CONCURRENCY: "${NANOBOT_TRAFFIC__WORKER_CONCURRENCY:-2}"
      NANOBOT_TRAFFIC__WEB_TENANT_SESSION_MANAGER_MAX_ENTRIES: "${NANOBOT_TRAFFIC__WEB_TENANT_SESSION_MANAGER_MAX_ENTRIES:-64}"
      # Safer default for SaaS: disable exec by default; if enabled, prefer docker isolation.
      NANOBOT_TOOLS__EXEC__ENABLED: "${NANOBOT_TOOLS__EXEC__ENABLED:-0}"
      NANOBOT_TOOLS__EXEC__MODE: "${NANOBOT_TOOLS__EXEC__MODE:-docker}"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18790/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    volumes:
      - "${NANOBOT_DATA_DIR:-/opt/nanobot/data}:/root/.nanobot"
      # Optional mounts for docker-mode exec sandbox:
      # - /var/run/docker.sock:/var/run/docker.sock
      # - /usr/bin/docker:/usr/bin/docker:ro

    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m

    mem_limit: "${NANOBOT_MEM_LIMIT:-1024m}"
    cpus: "${NANOBOT_CPUS:-1.0}"
    pids_limit: 256

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
